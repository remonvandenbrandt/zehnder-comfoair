globals:
  - id: register_dump_result
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: register_dump_batch
    type: int
    restore_value: no
    initial_value: '0'

text_sensor:
  - platform: template
    name: "Register Dump"
    id: zehnder_register_dump_output
    entity_category: "diagnostic"
    update_interval: never
    icon: mdi:database-export

script:
  - id: register_dump_script
    mode: single
    then:
      - lambda: |-
          id(register_dump_result) = "";
          id(register_dump_batch) = 0;
          id(zehnder_register_dump_output).publish_state("Reading batch 1/3 (registers 0-124)...");
          ESP_LOGI("register_dump", "Starting register dump...");

      # --- Batch 1: registers 0-124 (125 registers) ---
      - lambda: |-
          auto *controller = id(modbus_device);
          esphome::modbus_controller::ModbusCommandItem cmd =
            esphome::modbus_controller::ModbusCommandItem::create_read_command(controller, esphome::modbus_controller::ModbusRegisterType::HOLDING, 0, 125);

          cmd.on_data_func = [](esphome::modbus_controller::ModbusRegisterType register_type,
                                uint16_t start_address,
                                const std::vector<uint8_t> &data) {
            ESP_LOGI("register_dump", "Batch 1 received: %d bytes", data.size());
            for (int i = 0; i < 125 && (i * 2 + 1) < data.size(); i++) {
              uint16_t value = (data[i * 2] << 8) | data[i * 2 + 1];
              id(register_dump_result) += std::to_string(i) + "," + std::to_string(value) + "\n";
            }
            id(register_dump_batch) = 1;
          };
          controller->queue_command(cmd);

      - delay: 2s

      # --- Batch 2: registers 125-249 (125 registers) ---
      - lambda: |-
          if (id(register_dump_batch) != 1) {
            id(zehnder_register_dump_output).publish_state("Error: Batch 1 failed");
            ESP_LOGE("register_dump", "Batch 1 did not complete");
            return;
          }
          id(zehnder_register_dump_output).publish_state("Reading batch 2/3 (registers 125-249)...");

          auto *controller = id(modbus_device);
          esphome::modbus_controller::ModbusCommandItem cmd =
            esphome::modbus_controller::ModbusCommandItem::create_read_command(controller, esphome::modbus_controller::ModbusRegisterType::HOLDING, 125, 125);

          cmd.on_data_func = [](esphome::modbus_controller::ModbusRegisterType register_type,
                                uint16_t start_address,
                                const std::vector<uint8_t> &data) {
            ESP_LOGI("register_dump", "Batch 2 received: %d bytes", data.size());
            for (int i = 0; i < 125 && (i * 2 + 1) < data.size(); i++) {
              uint16_t value = (data[i * 2] << 8) | data[i * 2 + 1];
              id(register_dump_result) += std::to_string(125 + i) + "," + std::to_string(value) + "\n";
            }
            id(register_dump_batch) = 2;
          };
          controller->queue_command(cmd);

      - delay: 2s

      # --- Batch 3: registers 250-374 (125 registers) ---
      - lambda: |-
          if (id(register_dump_batch) != 2) {
            id(zehnder_register_dump_output).publish_state("Error: Batch 2 failed");
            ESP_LOGE("register_dump", "Batch 2 did not complete");
            return;
          }
          id(zehnder_register_dump_output).publish_state("Reading batch 3/3 (registers 250-374)...");

          auto *controller = id(modbus_device);
          esphome::modbus_controller::ModbusCommandItem cmd =
            esphome::modbus_controller::ModbusCommandItem::create_read_command(controller, esphome::modbus_controller::ModbusRegisterType::HOLDING, 250, 125);

          cmd.on_data_func = [](esphome::modbus_controller::ModbusRegisterType register_type,
                                uint16_t start_address,
                                const std::vector<uint8_t> &data) {
            ESP_LOGI("register_dump", "Batch 3 received: %d bytes", data.size());
            for (int i = 0; i < 125 && (i * 2 + 1) < data.size(); i++) {
              uint16_t value = (data[i * 2] << 8) | data[i * 2 + 1];
              id(register_dump_result) += std::to_string(250 + i) + "," + std::to_string(value) + "\n";
            }
            id(register_dump_batch) = 3;
          };
          controller->queue_command(cmd);

      - delay: 2s

      # --- Publish result ---
      - lambda: |-
          if (id(register_dump_batch) != 3) {
            id(zehnder_register_dump_output).publish_state("Error: Batch 3 failed");
            ESP_LOGE("register_dump", "Batch 3 did not complete");
            return;
          }

          std::string header = "Register Dump\nAddr,Value\n";
          std::string full_result = header + id(register_dump_result);

          // Log the full dump to ESPHome logs as well
          ESP_LOGI("register_dump", "=== REGISTER DUMP START ===");
          ESP_LOGI("register_dump", "%s", full_result.c_str());
          ESP_LOGI("register_dump", "=== REGISTER DUMP END ===");

          id(zehnder_register_dump_output).publish_state("Complete (" + std::to_string(375) + " registers)");

          // Fire HA persistent notification
          id(register_dump_result) = full_result; // store for the service call below

      - homeassistant.service:
          service: persistent_notification.create
          data:
            title: "Zehnder ComfoAir - Register Dump"
            notification_id: "zehnder_register_dump"
          variables:
            dump_data: 'return id(register_dump_result);'
          data_template:
            message: "{{ dump_data }}"

      # Free memory after sending
      - lambda: |-
          id(register_dump_result) = "";
          id(register_dump_result).shrink_to_fit();

button:
  - platform: template
    name: "Dump Registers"
    id: zehnder_dump_registers
    icon: mdi:database-export
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: register_dump_script
