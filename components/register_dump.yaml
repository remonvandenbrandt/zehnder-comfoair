globals:
  - id: register_dump_result
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: register_dump_batch
    type: int
    restore_value: no
    initial_value: '0'

text_sensor:
  - platform: template
    name: "Register Dump"
    id: zehnder_register_dump_output
    entity_category: "diagnostic"
    update_interval: never
    icon: mdi:database-export

script:
  - id: register_dump_script
    mode: single
    then:
      - lambda: |-
          id(register_dump_result) = "| Addr (hex) | Addr (dec) | Value |\n|---|---|---|\n";
          id(register_dump_batch) = 0;
          id(zehnder_register_dump_output).publish_state("Reading registers...");
          ESP_LOGI("register_dump", "Starting register dump (0-374)...");

          auto *controller = id(modbus_device);
          const int batch_size = 50;
          const int total_registers = 375;
          const int num_batches = (total_registers + batch_size - 1) / batch_size; // 8 batches

          for (int batch = 0; batch < num_batches; batch++) {
            int start = batch * batch_size;
            int count = std::min(batch_size, total_registers - start);

            auto cmd = esphome::modbus_controller::ModbusCommandItem::create_read_command(
              controller, esphome::modbus_controller::ModbusRegisterType::HOLDING, start, count);

            cmd.on_data_func = [start, count, num_batches](
                esphome::modbus_controller::ModbusRegisterType register_type,
                uint16_t start_address,
                const std::vector<uint8_t> &data) {

              ESP_LOGI("register_dump", "Batch starting at %d: received %d bytes", start, data.size());

              for (int i = 0; i < count && (i * 2 + 1) < (int)data.size(); i++) {
                uint16_t value = (data[i * 2] << 8) | data[i * 2 + 1];
                int addr = start + i;
                char hex[8];
                snprintf(hex, sizeof(hex), "0x%03X", addr);
                id(register_dump_result) += "| " + std::string(hex) + " | " + std::to_string(addr) + " | " + std::to_string(value) + " |\n";
              }

              id(register_dump_batch)++;
              ESP_LOGI("register_dump", "Batch %d/%d complete", id(register_dump_batch), num_batches);

              if (id(register_dump_batch) >= num_batches) {
                ESP_LOGI("register_dump", "All batches complete, triggering publish");
                id(publish_dump_result).execute();
              }
            };

            controller->queue_command(cmd);
          }

  - id: publish_dump_result
    mode: single
    then:
      - homeassistant.service:
          service: persistent_notification.create
          data:
            title: "Zehnder ComfoAir - Register Dump"
            notification_id: "zehnder_register_dump"
          variables:
            dump_data: |-
              return id(register_dump_result);
          data_template:
            message: "{{ dump_data }}"
      - lambda: |-
          id(zehnder_register_dump_output).publish_state("Complete (375 registers)");
          ESP_LOGI("register_dump", "Register dump published to HA notification");
          // Free memory
          id(register_dump_result) = "";
          id(register_dump_result).shrink_to_fit();

button:
  - platform: template
    name: "Dump Registers"
    id: zehnder_dump_registers
    icon: mdi:database-export
    entity_category: "diagnostic"
    on_press:
      then:
        - script.execute: register_dump_script
