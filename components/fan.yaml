
globals:
  - id: software_request
    type: float
    restore_value: yes      # Remembers your UI setting after a power cut
    initial_value: '0.5'
  - id: hardware_request
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: is_syncing
    type: bool
    initial_value: 'false'  # Prevents the feedback loop during UI updates

binary_sensor:
  - platform: template
    id: fan_fault_sensor
    lambda: |-
      if (id(zehnder_status).state == "Normal") {
        return false;
      } else {
        return true;
      }

script:
  - id: sync_fan_logic
    mode: restart
    then:
      - lambda: |-
          float soft = id(software_request);
          float phys = id(hardware_request);
          float ui_max = max(soft, phys);
          
          // 1. Show fan entity as "Off" when there is a fault
          if (id(fan_fault_sensor).state) {        
            // Update UI to "Off"
            id(is_syncing) = true;
            auto call = id(fan_ui).make_call();
            call.set_state(false); // This shows the fan as "Off" in HA
            call.perform();
            id(is_syncing) = false;
            return; // Stop execution here
          }

          // 2. Normal Operation (No Fault)
          id(${fan_output}).set_level(soft);
          
          ESP_LOGI("fan_logic", "Output: %.2f (UI Max: %.2f)", soft, ui_max);

          id(is_syncing) = true;
          auto call = id(fan_ui).make_call();
          call.set_state(true);
          if (ui_max <= 0.1) call.set_speed(1);
          else if (ui_max <= 0.6) call.set_speed(2);
          else call.set_speed(3);
          call.perform();
          id(is_syncing) = false;

fan:
  - platform: template
    name: "Fan"
    id: fan_ui
    speed_count: 3
    on_turn_on:
      - lambda: |-
          if (id(fan_fault_sensor).state) {
            id(sync_fan_logic)->execute(); // Force UI back to Off
          }
    on_speed_set:
    - lambda: |-
        // If the script is the one changing the speed, do nothing!
        if (id(is_syncing)) return; 

        // Otherwise, it was a user click in the app
        if (x == 1) id(software_request) = 0.0;
        else if (x == 2) id(software_request) = 0.5;
        else if (x == 3) id(software_request) = 1.0;
        
        id(sync_fan_logic)->execute();

sensor:
- platform: combination
  id: physical_switch_level
  type: max
  sources:
    - source: zehnder_rf_control_setpoint
    - source: zehnder_three_way_control_setpoint
    - source: zehnder_bathroom_control_setpoint
  on_value:
      then:
        - lambda: |-
            // Update the hardware tracker
            if (x <= 10) id(hardware_request) = 0.0;
            else if (x <= 60) id(hardware_request) = 0.5;
            else id(hardware_request) = 1.0;
            
            // Note: We do NOT set the hardware here, 
            // but we run the script to update the UI.
            id(sync_fan_logic)->execute();
