substitutions:
  tx_pin: GPIO27
  rx_pin: GPIO25
  update_interval: 15s
  fan_output: fan_output

esphome:
  name: zehnder-comfoair
  friendly_name: Zehnder Comfoair

esp32: 
  board: esp32dev 
  framework: 
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  min_auth_mode: wpa2

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

packages:
  remote_package:
    url: https://github.com/CodedCactus/zehnder-comfoair
    ref: 'main'
    files: [components/zehnder.yaml,
            components/fan.yaml]
    refresh: 0s

output:
  - platform: esp32_dac
    pin: GPIO25
    id: fan_output
